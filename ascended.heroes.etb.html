<script type="text/javascript">
(function () {
  var scriptURL = 'https://sdks.shopifycdn.com/buy-button/latest/buy-button-storefront.min.js';

  function loadScript() {
    var script = document.createElement('script');
    script.async = true;
    script.src = scriptURL;
    document.body.appendChild(script);
    script.onload = ShopifyBuyInit;
  }

  if (!window.ShopifyBuy) {
    loadScript();
  } else if (!window.ShopifyBuy.UI) {
    loadScript();
  } else {
    ShopifyBuyInit();
  }

  function ShopifyBuyInit() {
    var client = ShopifyBuy.buildClient({
      domain: 'pxq5yx-ka.myshopify.com',
      storefrontAccessToken: '61a50ca3e8975eccf13765c349333cc3',
    });

    ShopifyBuy.UI.onReady(client).then(function (ui) {
      ui.createComponent('product', {
        id: '7842458075214',
        node: document.getElementById('product-component-ascended'),
        options: {
          product: {
            layout: "horizontal",   // THIS fixes stacking
            styles: {
              product: {
                width: "100%",
                maxWidth: "100%"
              },
              button: {
                "background-color": "#111111",
                ":hover": { "background-color": "#1d1d1d" },
                ":focus": { "background-color": "#1d1d1d" }
              }
            },
            contents: {
              img: false,
              title: false,
              price: false,
              quantity: true   // enable quantity properly
            },
            text: { button: "Add to cart" }
          },
          cart: {
            styles: {
              button: {
                "background-color": "#111111",
                ":hover": { "background-color": "#1d1d1d" }
              }
            },
            popup: false
          }
        }
      });
    });
  }
})();
</script>
